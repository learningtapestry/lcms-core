# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

AllCops:
  Exclude:
    - bin/*
    - config.ru
    - config/application.rb
    - config/boot.rb
    - config/environment.rb
    - config/puma.rb
    - config/initializers/mime_types.rb
    - config/initializers/inflections.rb
    - config/initializers/filter_parameter_logging.rb
    - config/initializers/content_security_policy.rb
    - config/initializers/assets.rb
    - db/schema.rb
    - db/migrate/**/*
    - vendor/**/*
    - lib/tasks/auto_annotate_models.rake
  NewCops: enable

# Overwrite or add rules to create your own house style
#
# # Use `[a, [b, c]]` not `[ a, [ b, c ] ]`
# Layout/SpaceInsideArrayLiteralBrackets:
#   Enabled: false

Layout/EndAlignment:
  EnforcedStyleAlignWith: keyword

# Disallow using extra spaces for visual alignment (e.g. lining up `=` in
# consecutive assignments or constants). Such "layout via spaces" is brittle
# and noisy in diffs.
Layout/ExtraSpacing:
  Enabled: true
  AllowForAlignment: false
  AllowBeforeTrailingComments: false
  ForceEqualSignAlignment: false

# Enforce single space around the `=` in assignments — catches the same
# alignment-by-padding pattern from the operator side.
Layout/SpaceAroundOperators:
  Enabled: true
  AllowForAlignment: false

Layout/SpaceBeforeFirstArg:
  AllowForAlignment: false

Layout/SpaceInsideArrayLiteralBrackets:
  EnforcedStyle: no_space

Style/PercentLiteralDelimiters:
  PreferredDelimiters:
    '%i': '()'
    '%I': '()'
    '%w': '()'
    '%W': '()'
  Exclude:
    - Gemfile

Style/StringLiterals:
  EnforcedStyle: double_quotes
  Include:
    - app/**/*
    - config/**/*
    - lib/**/*
    - test/**/*
    - spec/**/*
    - Gemfile
